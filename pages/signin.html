<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign In | My-Air</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/animation.css">
</head>
<body>

  <nav class="navbar scrolled">
    <div class="nav-container">
      <a href="../index.html" class="nav-logo"><span>MY-AIR</span></a>
    </div>
  </nav>

  <main class="section" style="padding-top: 120px;">
    <div class="container">
      <div class="glass-card" style="max-width: 520px; margin: 0 auto;">
        <h2 class="section-title">Sign In</h2>
        <p style="color: var(--text-secondary); margin-bottom: 1rem">Enter your credentials to access the admin demo.</p>
        <form onsubmit="event.preventDefault(); alert('Signed in (demo)')">
          <div style="display:flex; flex-direction:column; gap: 12px;">
            <input type="email" placeholder="email@example.com" required style="padding:12px; border:1px solid var(--border-color); border-radius:8px;">
            <input type="password" placeholder="Password" required style="padding:12px; border:1px solid var(--border-color); border-radius:8px;">
            <button type="submit" class="btn btn-primary">Sign In</button>
          </div>
        </form>
      </div>
    </div>
  </main>

</body>
</html>
